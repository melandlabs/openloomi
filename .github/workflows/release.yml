            else
              echo "❌ DMG stapled but validation failed"
              exit 1
            fi
          else
            echo "⚠️  Failed to staple DMG after 20 attempts"
          fi

      - name: Upload Intel DMG
        uses: actions/upload-artifact@v4
        with:
          name: openloomi-dmg-x64
          path: ${{ github.workspace }}/apps/web/src-tauri/target/release/bundle/dmg/openloomi*.dmg

  # ─── Linux AMD64 CI ──────────────────────────────────────────────────────────
  release-linux-amd64:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout openloomi source code
        uses: actions/checkout@v4
        with:
