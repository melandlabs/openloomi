          EOF

      - name: Patch tauri.conf.json to skip MSI on Windows
        working-directory: ./apps/web
        shell: pwsh
        run: |
          $content = Get-Content src-tauri\tauri.conf.json -Raw
          $content = $content -replace '"targets"\s*:\s*"all"', '"targets": ["nsis"]'
          $content = $content -replace '"targets"\s*:\s*\[.*?\]', '"targets": ["nsis"]'
          $content = $content -replace '"wix"\s*:\s*\{[^}]*\}', '"wix": null'
          Set-Content -Path src-tauri\tauri.conf.json -Value $content -NoNewline
          Get-Content src-tauri\tauri.conf.json | Select-String 'targets'
          Get-Content src-tauri\tauri.conf.json | Select-String 'wix'

      - name: Build Tauri app (Windows)
        working-directory: ./apps/web
        shell: bash
        run: pnpm tauri:build
        env:
          RUSTUP_WINDOWS_PATH: 1
          TAURI_BUNDLE_TARGET: nsis

      - name: Upload Windows NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: openloomi-windows-nsis
          path: ${{ github.workspace }}/apps/web/src-tauri/target/release/bundle/nsis/*.exe

  # ─── Linux ARM64 CI ──────────────────────────────────────────────────────────
  release-linux-arm64:
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Checkout openloomi source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout specific commit if provided
        if: github.event.inputs.commit_sha != ''
        run: git checkout ${{ github.event.inputs.commit_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Add pnpm to PATH
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "PNPM_HOME=$HOME/.local" >> $GITHUB_ENV

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libxkbcommon-dev \
            libssl-dev \
            build-essential \
            xdg-utils

      - name: Get pnpm store directory
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Rebuild native modules for Tauri
        run: |
          pnpm rebuild better-sqlite3
          mkdir -p node_modules/@photon-ai/imessage-kit/node_modules/better-sqlite3/build
          cp node_modules/better-sqlite3/build/Release/better_sqlite3.node \
             node_modules/@photon-ai/imessage-kit/node_modules/better-sqlite3/build/better_sqlite3.node

      - name: Verify native modules are built
        run: |
          echo "=== Checking top-level better-sqlite3 ==="
          ls -la node_modules/better-sqlite3/build/Release/better_sqlite3.node || exit 1
          echo "=== Checking nested better-sqlite3 in imessage-kit ==="
          ls -la node_modules/@photon-ai/imessage-kit/node_modules/better-sqlite3/build/better_sqlite3.node || exit 1
          echo "All native modules built successfully"

      - name: Create .env file
        working-directory: ./apps/web
        run: |
          cat > .env << 'EOF'

          API_TIMEOUT_MS=3000000
          IS_TAURI=true

          EOF

      - name: Patch tauri.conf.json to skip AppImage on Linux ARM64
        working-directory: ./apps/web
        run: |
          node -e "
            const fs = require('fs');
            const c = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            c.bundle.targets = ['deb'];
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(c, null, 2));
            console.log('Patched targets to deb');
          "

      - name: Build Tauri app (Linux ARM64)
        working-directory: ./apps/web
        run: pnpm tauri:build

      - name: Upload Linux ARM64 deb
        uses: actions/upload-artifact@v4
        with:
          name: openloomi-linux-arm64
          path: ${{ github.workspace }}/apps/web/src-tauri/target/release/bundle/deb/*.deb

  # ─── Create Release ─────────────────────────────────────────────────────────
  create-release:
    needs: [release-macos-arm64, release-macos-intel, release-linux-amd64, release-windows, release-linux-arm64]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Version: $VERSION"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: ls -la artifacts/

      - name: Rename artifacts
        run: |
          cd artifacts
          mv openloomi-dmg-aarch64/*.dmg "openloomi_${VERSION}_aarch64.dmg"
          mv openloomi-dmg-x64/*.dmg "openloomi_${VERSION}_amd64.dmg"
          mv openloomi-linux-amd64/*.deb "openloomi_${VERSION}_amd64.deb"
          mv openloomi-linux-arm64/*.deb "openloomi_${VERSION}_arm64.deb"
          mv openloomi-windows-nsis/*.exe "openloomi_${VERSION}_amd64.exe"
          rm -rf openloomi-dmg-aarch64 openloomi-dmg-x64 openloomi-linux-amd64 openloomi-linux-arm64 openloomi-windows-nsis
          ls -la

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          overwrite_files: true
          generate_release_notes: true
          files: |
            artifacts/openloomi_${{ steps.version.outputs.version }}_aarch64.dmg
            artifacts/openloomi_${{ steps.version.outputs.version }}_amd64.dmg
            artifacts/openloomi_${{ steps.version.outputs.version }}_amd64.deb
            artifacts/openloomi_${{ steps.version.outputs.version }}_arm64.deb
            artifacts/openloomi_${{ steps.version.outputs.version }}_amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
