          rm -f ./apps/web/src-tauri/target/release/bundle/dmg/openloomi*.dmg

          APP_BUNDLE="./apps/web/src-tauri/target/release/bundle/macos/openloomi.app"
          COMMIT_SHA=$(git rev-parse --short HEAD)
          DMG_PATH="./apps/web/src-tauri/target/release/bundle/dmg/openloomi_${COMMIT_SHA}_x64.dmg"

          TEMP_DMG_DIR=$(mktemp -d)
          cp -R "$APP_BUNDLE" "$TEMP_DMG_DIR/"
          ln -s /Applications "$TEMP_DMG_DIR/Applications"

          hdiutil create -volname "openloomi" \
            -fs HFS+ \
            -srcfolder "$TEMP_DMG_DIR" \
            -format UDZO \
            "$DMG_PATH"

          rm -rf "$TEMP_DMG_DIR"

          echo "✅ DMG created from signed app bundle"

      - name: Notarize DMG
        if: env.SKIP_SIGNING != 'true'
        timeout-minutes: 60
        run: |
          DMG_PATH=$(ls ./apps/web/src-tauri/target/release/bundle/dmg/openloomi*.dmg)
          echo "Notarizing: $DMG_PATH"

          codesign -dv "$DMG_PATH" 2>&1 | head -5

