        run: pnpm tauri:build

      - name: Upload Linux AMD64 deb
        uses: actions/upload-artifact@v4
        with:
          name: openloomi-linux-amd64
          path: ${{ github.workspace }}/apps/web/src-tauri/target/release/bundle/deb/*.deb

