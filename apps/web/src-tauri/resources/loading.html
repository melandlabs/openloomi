<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #fafafa;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #374151;
      }
      @keyframes logoPulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.08);
          opacity: 0.85;
        }
      }
      .logo-text {
        color: #fff;
        font-size: 32px;
        font-weight: 700;
        font-family: system-ui;
      }
      .title {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 8px;
        color: #1f2937;
      }
      .msg {
        font-size: 13px;
        color: #9ca3af;
        margin-bottom: 28px;
        text-align: center;
      }
      .spinner {
        width: 28px;
        height: 28px;
        border: 3px solid #e5e7eb;
        border-top-color: #667eea;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="title">openloomi</div>
    <div class="msg" id="status">Starting up...</div>
    <div class="spinner"></div>
  </body>
</html>
